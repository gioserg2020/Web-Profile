  <style>
    :root {
      --navy:#0F172A;--slate:#475569;--accent:#2563EB;--accent-lt:#EFF6FF;--accent-md:#BFDBFE;
      --bg:#F8FAFC;--white:#FFFFFF;--rule:#E2E8F0;--text:#1E293B;--muted:#64748B;
      --font-display:'Syne',sans-serif;--font-mono:'IBM Plex Mono',monospace;--font-body:'IBM Plex Sans',sans-serif;--max:1120px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;cursor:none}
    a{color:inherit;text-decoration:none}ul{list-style:none}
    .cursor{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transition:transform 0.15s ease;transform:translate(-50%,-50%)}
    .cursor-ring{width:32px;height:32px;border:1px solid rgba(37,99,235,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:transform 0.35s ease,width 0.2s,height 0.2s;transform:translate(-50%,-50%)}
    .container{max-width:var(--max);margin:0 auto;padding:0 clamp(20px,5vw,64px)}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,250,252,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--rule)}
    .nav-inner{max-width:var(--max);margin:0 auto;padding:0 clamp(20px,5vw,64px);height:56px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--navy);letter-spacing:0.06em}
    .nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:28px;align-items:center}
    .nav-links a{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.08em;transition:color 0.2s}
    .nav-links a:hover{color:var(--navy)}
    .nav-cta{background:var(--navy)!important;color:#fff!important;padding:7px 18px}
    .nav-cta:hover{background:var(--accent)!important}
    #hero{min-height:100vh;display:flex;align-items:center;padding:100px 0 80px;position:relative;overflow:hidden}
    .hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
    .hero-bg-glow{position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,0.07) 0%,transparent 70%);pointer-events:none}
    .hero-inner{position:relative;z-index:1;width:100%}
    .hero-terminal{font-family:var(--font-mono);font-size:12px;color:var(--accent);letter-spacing:0.08em;margin-bottom:28px;display:flex;align-items:center;gap:10px;opacity:0;animation:fadeUp 0.6s ease 0.2s forwards}
